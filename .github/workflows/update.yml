name: Auto Update Vacancy Status

on:
  schedule:
    - cron: '0 * * * *'  # 毎時0分に実行
  workflow_dispatch:
    inputs:
      services:
        description: '実行するサービス (all / ielove / itandi / es またはカンマ区切り)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ielove
          - itandi
          - es
          - ielove,itandi
          - ielove,es
          - itandi,es
      os:
        description: '実行OS (IP切り替えテスト用。常用は ubuntu-latest 推奨)'
        required: false
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest
          - macos-latest
          - windows-latest

jobs:
  check:
    # cron や input なしの時は ubuntu-latest にフォールバック (無料枠の都合)
    runs-on: ${{ github.event.inputs.os || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Japanese fonts (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run main.py
        run: python main.py
        env:
          GSPREAD_JSON: ${{ secrets.GSPREAD_JSON }}
          ES_EMAIL: ${{ secrets.ES_EMAIL }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ITANDI_EMAIL: ${{ secrets.ITANDI_EMAIL }}
          ITANDI_PASSWORD: ${{ secrets.ITANDI_PASSWORD }}
          IELOVE_ID: ${{ secrets.IELOVE_ID }}
          IELOVE_PASSWORD: ${{ secrets.IELOVE_PASSWORD }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          # workflow_dispatch から渡された値を使用。
          # cron 実行時 (inputs が無い時) は 'all' にフォールバック。
          SERVICES: ${{ github.event.inputs.services || 'all' }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots
