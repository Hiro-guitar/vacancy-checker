name: Auto Update Vacancy Status

on:
  schedule:
    - cron: '0 * * * *'  # 毎時0分に実行
  workflow_dispatch:
    inputs:
      services:
        description: '実行するサービス (all / ielove / itandi / es またはカンマ区切り)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ielove
          - itandi
          - es
          - ielove,itandi
          - ielove,es
          - itandi,es
      os:
        description: '実行OS (常用は ubuntu-latest、IPテスト用に他も選択可)'
        required: false
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest
          - macos-latest
          - windows-latest
          - self-hosted

jobs:
  check:
    # ES + itandi はクラウド IP で問題なく動くため ubuntu-latest を既定に。
    # bb.ielove.jp は別途 Mac 側 cron (家庭 IP) で実行する。
    runs-on: ${{ github.event.inputs.os || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Japanese fonts (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run main.py
        run: python main.py
        env:
          GSPREAD_JSON: ${{ secrets.GSPREAD_JSON }}
          ES_EMAIL: ${{ secrets.ES_EMAIL }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ITANDI_EMAIL: ${{ secrets.ITANDI_EMAIL }}
          ITANDI_PASSWORD: ${{ secrets.ITANDI_PASSWORD }}
          IELOVE_ID: ${{ secrets.IELOVE_ID }}
          IELOVE_PASSWORD: ${{ secrets.IELOVE_PASSWORD }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          # cron 実行時 (inputs 無し) は ES と itandi だけ走らせる。
          # bb.ielove.jp は GitHub Actions のクラウドIPでは 403 で弾かれるため
          # 家庭 IP の Mac (cron) 側で別途 SERVICES=ielove で実行する運用。
          # 手動 (workflow_dispatch) で services を選んだ場合はその値を優先。
          SERVICES: ${{ github.event.inputs.services || 'es,itandi' }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots
